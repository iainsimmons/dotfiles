include ~/.config/omarchy/current/theme/kitty.conf

############
### Font ###
############

font_family CommitMono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 14.0
modify_font cell_height 120%


##############
### Window ###
##############

window_padding_width 1 5 2 2
draw_minimal_borders yes
hide_window_decorations yes
show_window_resize_notification no
confirm_os_window_close 0


##################
### Aesthetics ###
##################

# Cursor Trail
cursor_shape beam
cursor_beam_thickness 1.5
cursor_underline_thickness 2.0
cursor_blink_interval 0
cursor_stop_blinking_after 0
cursor_trail 1
cursor_trail_decay 0.01 0.5
cursor_trail_start_threshold 0
background black
background_opacity 0.85
active_border_color none
inactive_border_color black
# Tab Bar
# tab_bar_background #1A1A26
# tab_bar_edge top
# tab_bar_filter session:~ or session:^$
# tab_bar_min_tabs 0
# tab_bar_style powerline
# tab_powerline_style slanted
# tab_title_template {index} {title}


############
### Misc ###
############

scrollback_lines 10000
# Integration
shell sh -c ~/bin/kitty-shell
editor nvim
shell_integration no-cursor no-title
enable_audio_bell no
# Allow remote access
allow_remote_control yes


###################
### Keybindings ###
###################

# Reload config file
map super+shift+r load_config_file
# Copy
map ctrl+insert copy_to_clipboard
# Paste
map shift+insert paste_from_clipboard
# Open new OS window
map super+n new_os_window

## Neovim
# Save current buffer
map super+s combine | send_key escape | send_key escape | send_key : | send_key w | send_key enter
# Close current buffer
map super+b combine | send_key escape | send_key escape | send_key : | send_key b | send_key d | send_key enter
# Close current buffer, without saving
map super+shift+b combine | send_key escape | send_key escape | send_key : | send_key b | send_key d | send_key ! | send_key enter

# tmux keybinds
# switch to window by index (1-based)
map super+1 send_text all \x021
map super+2 send_text all \x022
map super+3 send_text all \x023
map super+4 send_text all \x024
map super+5 send_text all \x025
map super+6 send_text all \x026
map super+7 send_text all \x027
map super+8 send_text all \x028
map super+9 send_text all \x029
# Change to tmux copy mode
map super+shift+c send_text all \x02[
# Detach session
map super+shift+d send_text all \x02d
# Split the current pane into two, top and bottom
map super+e send_text all \x02"
# Split the current pane into two, left and right
map super+shift+e send_text all \x02%
# Toggle Neotree (file tree) via tmux y keybind
map super+f send_text all \x02y
# Open lazygit in a new tmux window
map super+g send_text all \x02g
# Jump to new/existing window via sesh
# https://github.com/joshmedeski/sesh
map super+j send_text all \x02t
# switch to previous session
map super+shift+j send_text all \x02L
# switch to previous sesh session
map super+l send_text all \x02\x0C
# Open URLs 'joshmedeski/tmux-fzf-url'
map super+o send_text all \x02u
# Find files with Telescope, with grep, including hidden, ignoring .git via tmux Y keybind
map super+p send_text all \x02Y
# Create a new tmux window/tab
map super+t send_text all \x02c
# Break the current tmux pane out of the tmux window
map super+shift+t send_text all \x02!
# Kill/close the current tmux pane (and window if last pane)
map super+w send_text all \x02x
# Open yazi in a new tmux window
map super+y send_text all \x02A
# Toggle the zoom state of the current tmux pane
map super+z send_text all \x02z
# Cycle through tmux panes
map super+right_bracket send_text all \x02o
# previous window
map super+shift+left_bracket send_text all \x02p
# next window
map super+shift+right_bracket send_text all \x02n
# tmux-fuzzback (search scrollback with fuzzy finder)
map super+backslash send_text all \x02b
# Open tmux command input
map super+semicolon send_text all \x02:
# tmux built-in session overview
map super+apostrophe send_text all \x02s
# Rename the current tmux session
map super+shift+period send_text all \x02$

