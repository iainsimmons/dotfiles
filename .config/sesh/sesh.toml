#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json
cache = true

[tui]
prompt = "⚡ "
placeholder = "Pick a sesh…"
show_icons = true

[default_session]
name = "dotfiles"
path = "~/.dotfiles"

[[session]]
name = "nvim-config"
path = "~/.config/nvim"
startup_command = "nvim"

[[session]]
name = "Downloads"
path = "~/Downloads"
startup_command = "yazi"
