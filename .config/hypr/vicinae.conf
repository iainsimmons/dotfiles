exec-once = vicinae server

# use whatever shortcut floats your boat
bind = SUPER, SPACE, exec, vicinae toggle
bind = SUPER CTRL, C, exec, vicinae vicinae://launch/clipboard/history

# blur
layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    match:namespace = vicinae
}

# disable animation for vicinae only
layerrule {
    name = vicinae-no-animation
    no_anim = on
    match:namespace = vicinae
}

